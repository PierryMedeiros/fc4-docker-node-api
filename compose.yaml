name: flags-api-dev

services:
  db:
    image: postgres:17.2-alpine@sha256:7e5df973a74872482e320dcbdeb055e178d6f42de0558b083892c50cda833c96
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    networks:
      - flags-net

  app:
    build:
      context: .
      target: dev
    env_file: .env
    # Aplica as migrações e sobe o servidor em modo watch. A imagem `dev`
    # (Node slim) possui shell, então encadeamos os dois passos aqui.
    command: ["sh", "-c", "npm run db:migrate && npm run dev"]
    ports:
      - "${PORT:-3000}:3000"
    depends_on:
      db:
        condition: service_healthy
    develop:
      watch:
        # Mudanças no código-fonte são sincronizadas para dentro do container;
        # o `tsx watch` recarrega sozinho, sem rebuild.
        - action: sync
          path: ./src
          target: /app/src
        # Mudança de dependências exige reconstruir a imagem.
        - action: rebuild
          path: ./package.json
        - action: rebuild
          path: ./package-lock.json
    networks:
      - flags-net

  # Cliente web de banco, disponível só com o profile `tools`:
  #   docker compose --profile tools up -d
  adminer:
    image: adminer:4.8.1
    profiles:
      - tools
    ports:
      - "8081:8080"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - flags-net

volumes:
  pgdata:

networks:
  flags-net:
    name: flags-dev-net
